<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Quiz, Plato-Quizz</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" th:href="@{/style/globals.css}" href="/style/globals.css">
    <link rel="stylesheet" th:href="@{/style/quick-quiz.css}" href="/style/quick-quiz.css">
</head>
<body class="quiz-body">
    <div class="quiz-container">
        <!-- Header du Quiz -->
        <header class="quiz-header">
            <a th:href="@{/accueil}" href="/accueil" class="exit-btn" title="Quitter">
                <span class="material-symbols-outlined">close</span>
            </a>
            <div class="quiz-progress-wrapper">
                <div class="progress-info">
                    <span id="question-number">Question 1/10</span>
                    <span id="quiz-timer">15s</span>
                </div>
                <div class="progress-bar-bg">
                    <div id="progress-fill" class="progress-bar-fill"></div>
                </div>
            </div>
            <div class="score-badge">
                <span class="material-symbols-outlined">stars</span>
                <span id="current-score">0</span>
            </div>
        </header>

        <!-- Zone de Question -->
        <main class="quiz-main" id="quiz-main">
            <div id="loader" class="loader-wrapper">
                <div class="spinner"></div>
                <p>Chargement des questions...</p>
            </div>

            <div id="question-card" class="question-card card" hidden>
                <div class="category-tag" id="question-category">Culture Générale</div>
                <h2 id="question-text">Préparation de votre question...</h2>
                <div class="options-container" id="options-container">
                    <!-- Les options seront générées ici -->
                </div>
            </div>
        </main>

        <!-- Écran de Fin -->
        <section id="result-card" class="result-card card text-center" hidden>
            <div class="result-icon">
                <span class="material-symbols-outlined">workspace_premium</span>
            </div>
            <h1>Quizz Terminé!</h1>
            <p class="text-muted">Félicitations pour avoir terminé ce quiz rapide.</p>
            
            <div class="stats-summary">
                <div class="stat-box">
                    <span class="stat-val" id="final-score">0</span>
                    <span class="stat-lbl">Points</span>
                </div>
                <div class="stat-box">
                    <span class="stat-val" id="correct-count">0/10</span>
                    <span class="stat-lbl">Réponses</span>
                </div>
            </div>

            <div class="result-actions">
                <button onclick="location.reload()" class="btn btn-primary btn-lg">Rejouer</button>
                <a th:href="@{/accueil}" href="/accueil" class="btn btn-secondary btn-lg">Retour au Dashboard</a>
            </div>
        </section>
    </div>

    <script th:src="@{/script/quick-quiz.js}" src="/script/quick-quiz.js"></script>
</body>
</html>
